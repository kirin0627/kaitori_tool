<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width,
    initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>買取ツール</title>

    <style>
        body{
            background-color: #f0f2f5;
            font-family: Arial, sans-serif;
        }
        .container{
            width: 90%;
            max-width: 400px;
            margin: 50px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1{text-align: center;}
        p{margin: 5px 0;}
        input{
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 10px;
        }
        input[type="submit"]{
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        input[type="submit"]:hover{background: #0056b3;}
        .error{color: red;}
        .histoory{
            background: #f9f9f9;
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
        }
        .price{color: blue;}
        .amari{color: red;}
    </style>
</head>
<body style="max-width: 500px; margin: auto; font-family: sans-serif;">

<div class="container">

<h1>アイテム価格計算機</h1>

<form method="post" action="/">

<p>アイテム名</p>
<input list="items" name="item" placeholder="アイテムを検索"
    style="width: 100%; padding: 10px; font-size:16x;">

<datalist id="items">
    {% for item in items %}
    <option value="{{ item }}">
    {% endfor %}
</datalist>

<p>個数</p>
<input type="number" name="kosuu" min="1" step="1"
    style="width: 100%; padding: 10px; font-size:16x;">

<input type="submit" value="計算"
    style="width: 100%; padding: 12px; font-size:18x;">

</form>

<!-- エラー表示 -->
{% if error %}
    <p class="error">{{ error }}</p>
{% endif %}
<hr>

<h3>計算結果</h3>

{% for h in history %}
    <div style="
    background:#eeeeee;
    border-radius: 10px;
    padding: 12px;
    margin-bottom: 10px;
    ">

    <!--アイテム名-->
    <div style="font-weight:bold; font-size: 18px; margin-bottom: 5px;">
        {{ h.item }}
    </div>

    <!--個数-->
    <div>
        個数:{{ h.kosuu }}個
    </div>

    <!--買取価格-->
    <div>
        買取価格:
        <span style="color:blue; font-weight:bold;">
            {{ h.enn }}円
        </span>
    </div>

    <!--買取不可-->
    <div>
        買取不可:
        <span style="color:red; font-weight:bold;">
            {{ h.amari }}個
        </span>
    </div>
</div>
{% endfor %}

</body>
</html>
